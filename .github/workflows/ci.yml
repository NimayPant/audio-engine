name: CI_CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsndfile1-dev libasound2-dev libx11-dev libxinerama-dev libxext-dev libfreetype6-dev libwebkit2gtk-4.0-dev libglu1-mesa-dev libxcursor-dev libxrandr-dev libcurl4-openssl-dev

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tools/requirements.txt

    - name: Install Node.js dependencies
      working-directory: ./ui
      run: npm install

    - name: Build C++ DSP Engine
      run: |
        mkdir build
        cd build
        cmake ..
        cmake --build . --config Release

    - name: Build VST Plugin
      working-directory: ./vst
      run: |
        mkdir build
        cd build
        cmake ..
        cmake --build . --config Release

    - name: Upload VST Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Legendary-DSP-Ubuntu-VST3
        path: vst/build/**/*.vst3

    - name: Trigger Render Deployment
      if: github.ref == 'refs/heads/main'
      env:
        RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        if [ ! -z "$RENDER_DEPLOY_HOOK" ]; then curl -X GET "$RENDER_DEPLOY_HOOK"; fi
